<!DOCTYPE html>
<html>
<head>
  <title>Amazon Rainforest – Lifelike 360° Day/Night</title>
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <!-- Orbit controls = 360° drag + zoom on desktop & mobile -->
  <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
</head>
<body>
  <a-scene 
    background="color: #0a140a"
    fog="type: exponential; color: #0f1a0d; density: 0.0008"
    vr-mode-ui="enabled: true"   <!-- Shows the VR button -->
    renderer="antialias: true; colorManagement: true">

    <!-- Dense jungle background -->
    <a-entity 
      id="env"
      environment="preset: forest; 
                   seed: 42; 
                   dressingAmount: 1400; 
                   dressingScale: 5 9 5; 
                   dressingColor: #0d3c0d #082608; 
                   ground: hills; 
                   groundColor: #0b1408; 
                   groundYScale: 9; 
                   skyType: gradient; 
                   skyColor: #4a8cff; 
                   horizonColor: #143012; 
                   fog: 0.6; 
                   lightPosition: 1 3 -3; 
                   shadow: true">
    </a-entity>

    <!-- Day/Night cycle (4-minute smooth loop) -->
    <a-entity animation="property: components.environment.data.skyColor; from: #4a8cff; to: #000814; dur: 240000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation="property: components.environment.data.horizonColor; from: #143012; to: #000408; dur: 240000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation="property: components.environment.data.lightPosition; from: 1 3 -3; to: -2 0.5 -1; dur: 240000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation="property: components.environment.data.fog; from: 0.6; to: 0.95; dur: 240000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>

    <!-- Ambient sounds (day birds + night frogs layer) -->
    <a-entity sound="src: url(https://cdn.pixabay.com/download/audio/2023/08/07/audio_8d7b6e8f9e.mp3); autoplay: true; loop: true; volume: 0.65"></a-entity>
    <a-entity sound="src: url(https://cdn.pixabay.com/download/audio/2024/01/15/audio_night-jungle-frogs-owls.mp3); autoplay: true; loop: true; volume: 0; animation__night: property: sound.volume; from: 0; to: 0.55; dur: 120000; loop: true; dir: alternate; delay: 120000"></a-entity>

    <!-- 360° Orbit Camera (drag to rotate 360°, scroll/pinch to zoom) -->
    <a-camera 
      id="cam"
      position="0 12 35" 
      orbit-controls="target: 0 5 0; 
                       minDistance: 5; 
                       maxDistance: 80; 
                       enableDamping: true; 
                       dampingFactor: 0.12; 
                       rotateSpeed: 0.5; 
                       zoomSpeed: 1.2; 
                       enablePan: true">
    </a-camera>

    <!-- Tall canopy trees (background) -->
    <a-entity gltf-model="url(YOUR_HOSTED_TREE1.glb)" scale="10 10 10" position="-15 0 -30" rotation="0 45 0"></a-entity>
    <a-entity gltf-model="url(YOUR_HOSTED_TREE2.glb)" scale="12 12 12" position="18 0 -35" rotation="0 -50 0"></a-entity>

    <!-- Animals (replace URLs with your hosted files - see instructions below) -->

    <!-- Howler Monkey (high in tree, gentle sway) -->
    <a-entity position="-8 14 -18" scale="3.5 3.5 3.5" rotation="0 90 0">
      <a-entity gltf-model="url(YOUR_HOSTED_HOWLER.glb)" animation-mixer="clip: *; loop: true"></a-entity>
      <a-entity animation="property: position.y; from: 14; to: 14.8; dur: 6000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    </a-entity>

    <!-- Animated Jaguar (patrolling ground) -->
    <a-entity position="6 0 -12" scale="4 4 4">
      <a-entity gltf-model="url(YOUR_HOSTED_JAGUAR.glb)" animation-mixer="clip: walk; loop: true"></a-entity>
      <a-entity animation="property: position.x; from: 6; to: -8; dur: 25000; loop: true; dir: alternate; easing: linear"></a-entity>
    </a-entity>

    <!-- Toucan/Macaw (flying loop) -->
    <a-entity position="12 11 -8" scale="2.8 2.8 2.8">
      <a-entity gltf-model="url(YOUR_HOSTED_MACAW.glb)" animation-mixer></a-entity>
      <a-entity animation="property: position; from: 12 11 -8; to: 20 15 -15; dur: 18000; loop: true; dir: alternate; easing: easeInOutQuad"></a-entity>
    </a-entity>

    <!-- Sloth (hanging, slow rotate) -->
    <a-entity position="-4 9 -7" scale="3.5 3.5 3.5">
      <a-entity gltf-model="url(YOUR_HOSTED_SLOTH.glb)" animation-mixer="clip: idle"></a-entity>
      <a-entity animation="property: rotation.y; from: 0; to: 360; dur: 90000; loop: true; easing: linear"></a-entity>
    </a-entity>

    <!-- Poison Dart Frog (simple glowing proxy - replace with real model if you want) -->
    <a-entity position="3 0.4 -5" scale="1.5 1.5 1.5">
      <a-sphere radius="0.2" color="#ff0088" emissive="#ff44aa" emissive-intensity="0.6"></a-sphere>
    </a-entity>

    <!-- Mist + Fireflies (stronger at night) -->
    <a-entity particle-system="preset: dust; color: #aaffff; particleCount: 350; maxAge: 15; speed: 0.07; size: 1.5 4; positionSpread: 70 15 70; opacity: 0.15"></a-entity>
    <a-entity particle-system="preset: dust; color: #ffee88; particleCount: 180; maxAge: 7; speed: 0.3; size: 0.3 1; positionSpread: 45 8 45; opacity: 0.7" 
              animation__night="property: particle-system.enabled; from: false; to: true; dur: 1; delay: 120000; loop: true; dir: alternate"></a-entity>

  </a-scene>
</body>
</html>
