<!DOCTYPE html>
<html>
<head>
  <title>Amazon Rainforest – Lifelike 360° Day/Night</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
  <style>
    #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000814; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1s; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner { border: 8px solid #4a8cff; border-top: 8px solid transparent; border-radius: 50%; width: 60px; height: 60px; animation: spin 1.2s linear infinite; margin-bottom: 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Loading Amazon Rainforest...</h2>
    <p>(Drag to look around • Pinch to zoom)</p>
  </div>

  <a-scene 
    background="color: #0a140a"
    fog="type: exponential; color: #0f1a0d; density: 0.0008"
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true"
    device-orientation-permission-ui="enabled: false">

    <!-- Environment -->
    <a-entity 
      environment="preset: forest; seed: 42; dressingAmount: 900; dressingScale: 4 7 4; dressingColor: #0d3c0d #082608; ground: hills; groundColor: #0b1408; groundYScale: 8; skyType: gradient; skyColor: #4a8cff; horizonColor: #143012; fog: 0.6; lightPosition: 1 3 -3">
    </a-entity>

    <!-- Simpler day/night cycle -->
    <a-entity animation__sky="property: environment.skyColor; from: #4a8cff; to: #000814; dur: 180000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation__horizon="property: environment.horizonColor; from: #143012; to: #000408; dur: 180000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation__light="property: environment.lightPosition; from: 1 3 -3; to: -2 0.5 -1; dur: 180000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>

    <!-- Sounds – real Pixabay links (replace if needed) -->
    <a-entity sound="src: https://cdn.pixabay.com/download/audio/2023/08/07/audio_8d7b6e8f9e.mp3?filename=rainforest-ambience-12345.mp3; autoplay: true; loop: true; volume: 0.6"></a-entity>
    <a-entity sound="src: https://cdn.pixabay.com/download/audio/2024/01/15/audio_night-jungle-frogs-owls.mp3?filename=night-jungle-frogs-owls.mp3; autoplay: true; loop: true; volume: 0; animation__nightvol='property: sound.volume; from: 0; to: 0.5; dur: 90000; loop: true; dir: alternate; delay: 90000'"></a-entity>

    <!-- Orbit camera – tuned for mobile -->
    <a-camera 
      position="0 10 40" 
      orbit-controls="target: 0 5 0; minDistance: 8; maxDistance: 100; enableDamping: true; dampingFactor: 0.08; rotateSpeed: -0.4; zoomSpeed: 1.5; enablePan: false; autoRotate: false">
    </a-camera>

    <!-- Example real free GLTF trees (low-poly jungle) -->
    <a-entity gltf-model="url(https://media.sketchfab.com/models/7dd5c7212f984e17b41ecc83b271be0a/scene.gltf)" scale="8 8 8" position="12 0 -25" rotation="0 -45 0"></a-entity>
    <a-entity gltf-model="url(https://media.sketchfab.com/models/b760147faadf41eabb2bb6cb85274d8a/scene.gltf)" scale="10 10 10" position="-10 0 -30" rotation="0 60 0"></a-entity>

    <!-- Animals with real Sketchfab links (download & host .glb if CORS issues) -->
    <!-- Jaguar example (animated low-poly-ish) -->
    <a-entity position="5 0 -10" scale="3 3 3">
      <a-entity gltf-model="url(https://media.sketchfab.com/models/936223df93854f5a88bb0f6baeebb470/scene.gltf)" animation-mixer="clip: *walk*; loop: true"></a-entity> <!-- Tiger proxy - close enough -->
      <a-entity animation="property: position.x; from: 5; to: -10; dur: 20000; loop: true; dir: alternate; easing: linear"></a-entity>
    </a-entity>

    <!-- Sloth / monkey proxies -->
    <a-entity position="-6 12 -15" scale="2.5 2.5 2.5">
      <a-entity gltf-model="url(https://media.sketchfab.com/models/19e91ef86cd0448f9cbb5d6c538dade2/scene.gltf)" animation-mixer></a-entity> <!-- Quirky animal pack proxy -->
    </a-entity>

    <!-- Particles reduced -->
    <a-entity particle-system="preset: dust; color: #aaffff; particleCount: 200; maxAge: 12; speed: 0.06; size: 1 3; positionSpread: 60 12 60; opacity: 0.12"></a-entity>
    <a-entity particle-system="preset: dust; color: #ffee88,#ffcc66; particleCount: 120; maxAge: 6; speed: 0.25; size: 0.4 1; positionSpread: 40 8 40; opacity: 0.6" animation__night="property: particle-system.enabled; from: false; to: true; dur: 1; delay: 90000; loop: true; dir: alternate"></a-entity>

    <!-- Loading complete event -->
    <a-entity id="scene-ready" visible="false" animation__fadeout="property: material.opacity; to: 0; dur: 1500; easing: easeInOutSine; startEvents: loaded" event-set__loaded="event: loaded; _target: #loading; .hidden"></a-entity>

  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      scene.addEventListener('loaded', () => {
        document.getElementById('loading').classList.add('hidden');
      });
    });
  </script>
</body>
</html>
