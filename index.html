<!DOCTYPE html>
<html>
<head>
  <title>Amazon Rainforest – Lifelike 360° Day/Night</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://unpkg.com/aframe-environment-component@1.3.2/dist/aframe-environment-component.min.js"></script>
  <script src="https://unpkg.com/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
  <script src="https://unpkg.com/aframe-orbit-controls@1.3.2/dist/aframe-orbit-controls.min.js"></script>
  <style>
    #loading { position: fixed; inset: 0; background: #000814; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 1.2s; font-family: sans-serif; }
    #loading.hidden { opacity: 0; pointer-events: none; }
    #loading .spinner { border: 8px solid #4a8cff; border-top: 8px solid transparent; border-radius: 50%; width: 60px; height: 60px; animation: spin 1.2s linear infinite; margin-bottom: 20px; }
    #error { color: #ff6666; margin-top: 20px; max-width: 80%; text-align: center; display: none; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spinner"></div>
    <h2>Loading Amazon Rainforest...</h2>
    <p>(Drag to look around • Pinch to zoom)</p>
    <p id="error">If stuck >20s, check connection or try desktop. Assets may be loading slowly.</p>
  </div>

  <a-scene 
    background="color: #0a140a"
    fog="type: exponential; color: #0f1a0d; density: 0.0009"
    vr-mode-ui="enabled: true"
    renderer="antialias: true; colorManagement: true"
    device-orientation-permission-ui="enabled: false"
    embedded>

    <!-- Light environment to reduce load -->
    <a-entity environment="preset: forest; seed: 42; dressingAmount: 600; dressingScale: 3 6 3; ground: hills; groundColor: #0b1408; skyType: gradient; skyColor: #4a8cff; horizonColor: #143012; fog: 0.7; lightPosition: 1 2 -2"></a-entity>

    <!-- Simpler cycle animations -->
    <a-entity animation__sky="property: environment.skyColor; from: #4a8cff; to: #000814; dur: 180000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>
    <a-entity animation__horizon="property: environment.horizonColor; from: #143012; to: #000408; dur: 180000; loop: true; dir: alternate; easing: easeInOutSine"></a-entity>

    <!-- Comment these sounds out first to test -->
    <!-- <a-entity sound="src: https://cdn.pixabay.com/download/audio/2023/08/07/audio_8d7b6e8f9e.mp3; autoplay: true; loop: true; volume: 0.5"></a-entity> -->

    <!-- Orbit camera – mobile tuned -->
    <a-camera position="0 8 45" orbit-controls="target: 0 4 0; minDistance: 10; maxDistance: 120; dampingFactor: 0.1; rotateSpeed: -0.5; zoomSpeed: 1.8; enablePan: false"></a-camera>

    <!-- One simple test tree – use this public one or host your own -->
    <a-entity gltf-model="url(https://media.sketchfab.com/models/7dd5c7212f984e17b41ecc83b271be0a/scene.gltf)" scale="6 6 6" position="0 0 -20" rotation="0 0 0"></a-entity>

    <!-- Minimal particles for atmosphere -->
    <a-entity particle-system="preset: dust; color: #aaffff; particleCount: 150; maxAge: 10; speed: 0.05; size: 1 2.5; positionSpread: 50 10 50; opacity: 0.1"></a-entity>

  </a-scene>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading');
      const errorMsg = document.getElementById('error');

      scene.addEventListener('loaded', () => {
        loading.classList.add('hidden');
      });

      // Fallback timeout
      setTimeout(() => {
        if (!loading.classList.contains('hidden')) {
          loading.classList.add('hidden');
          errorMsg.style.display = 'block';
        }
      }, 20000); // 20 seconds
    });
  </script>
</body>
</html>
